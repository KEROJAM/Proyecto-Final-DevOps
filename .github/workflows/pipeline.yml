name: CI/CD Pipeline – STF DevOps
# Se ejecuta automáticamente en cada push a main o develop

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 1: Build de imagen Docker
  # ══════════════════════════════════════════════════════════════════════════
  build:
    name: Build Docker
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Construir imagen Docker (multi-stage)
        run: docker build -t stf-flask:latest ./app

      - name: Verificar que la imagen arranca correctamente
        run: |
          docker run -d --name test-flask -p 5000:5000 stf-flask:latest
          sleep 5
          curl --fail http://localhost:5000/health || (docker logs test-flask && exit 1)
          docker stop test-flask

  # ══════════════════════════════════════════════════════════════════════════
  # JOB 2: Despliegue en EC2 via SSM usando deploy_ec2.sh
  # Solo corre en push a main (no en PRs ni en develop)
  # ══════════════════════════════════════════════════════════════════════════
  deploy:
    name: Despliegue en EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token:     ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region:            us-east-1

      - name: Empaquetar artefacto
        run: zip -r artefacto.zip app/ nginx/ docker-compose.yml .env scripts/

      - name: Subir artefacto a S3
        run: |
          aws s3 cp artefacto.zip \
            s3://${{ secrets.BUCKET_ARTEFACTOS }}/artefacto.zip

      - name: Guardar build exitoso en SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name "/stf/ultimo-build-exitoso" \
            --value "${{ github.sha }}" \
            --type String \
            --overwrite

      - name: Verificar que SSM puede ver la instancia
        run: |
          STATUS=$(aws ssm describe-instance-information \
            --filters "Key=InstanceIds,Values=${{ secrets.EC2_INSTANCE_ID }}" \
            --query "InstanceInformationList[0].PingStatus" \
            --output text 2>/dev/null || echo "None")
          echo "SSM Ping Status: $STATUS"
          if [ "$STATUS" != "Online" ]; then
            echo "ERROR: La instancia no está registrada en SSM."
            exit 1
          fi

      - name: Ejecutar deploy_ec2.sh en EC2 via SSM
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ secrets.EC2_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              \"export BUCKET_ARTEFACTOS=${{ secrets.BUCKET_ARTEFACTOS }}\",
              \"export COMMIT_SHA=${{ github.sha }}\",
              \"export PATH=\$PATH:/usr/bin:/usr/local/bin:/snap/bin\",
              \"aws s3 cp s3://${{ secrets.BUCKET_ARTEFACTOS }}/artefacto.zip /home/ubuntu/stf-app/artefacto.zip --region us-east-1\",
              \"cd /home/ubuntu/stf-app && unzip -o artefacto.zip\",
              \"bash /home/ubuntu/stf-app/scripts/deploy_ec2.sh\"
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "Command ID: $COMMAND_ID"

          # Esperar hasta 5 minutos a que termine
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}"

          # Mostrar output del script en EC2
          echo "=== OUTPUT DEL DEPLOY ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardOutputContent" \
            --output text

          echo "=== ERRORES (si los hay) ==="
          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "${{ secrets.EC2_INSTANCE_ID }}" \
            --query "StandardErrorContent" \
            --output text

          echo "Despliegue completado."
