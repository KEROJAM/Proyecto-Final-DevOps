# nginx.conf – Reverse proxy hacia Flask (gunicorn)
# Soluciones Tecnológicas del Futuro

# Ejecutar como usuario sin privilegios dentro del contenedor
user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Formato de log estándar
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    keepalive_timeout  65;

    # Ocultar versión de nginx en headers (seguridad)
    server_tokens off;

    # ── Servidor principal ───────────────────────────────────────────────────
    server {
        listen       80;
        server_name  _;

        # Proxy inverso hacia Flask/gunicorn
        location / {
            proxy_pass         http://flask:5000;
            proxy_http_version 1.1;

            # Headers necesarios para que Flask sepa la IP real del cliente
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout  10s;
            proxy_read_timeout     60s;
        }

        # Health check directo en nginx (sin pasar por Flask)
        location /nginx-health {
            access_log off;
            return 200 "nginx ok\n";
            add_header Content-Type text/plain;
        }
    }
}
